<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memoria – Email Confirmed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1d27;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #9ca3af; font-size: 15px; line-height: 1.5; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #0d9488;
      color: #fff;
      text-decoration: none;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
  <script>
    // Auto-open the app
    window.location = 'memoria://';
  </script>
</head>
<body>
  <div class="card">
    <div class="emoji">✅</div>
    <h1>Email confirmed!</h1>
    <p>Your account is ready. Open Memoria to start your first adventure.</p>
    <a class="btn" href="memoria://">Open Memoria</a>
  </div>
</body>
</html>
