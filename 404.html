<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    const path = window.location.pathname;
    const joinMatch = path.match(/^\/join\/(.+)/);
    if (joinMatch) {
      window.location.replace('memoria://join/' + joinMatch[1]);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
